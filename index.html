<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Ekibastuz | Final Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f5f5f7;
            --sidebar: rgba(255, 255, 255, 0.95);
            --text: #1d1d1f;
            --text-muted: #86868b;
            --accent: #0071e3;
            --border: rgba(0, 0, 0, 0.1);
            --card: #ffffff;
            --danger: #ff3b30;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --sidebar: rgba(28, 28, 30, 0.95);
            --text: #f5f5f7;
            --text-muted: #8e8e93;
            --accent: #0a84ff;
            --border: rgba(255, 255, 255, 0.15);
            --card: #1c1c1e;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; width: 100vw; overflow: hidden;
        }

        .layout { display: grid; grid-template-columns: 400px 1fr; height: 100vh; }
        
        .sidebar { 
            background: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; z-index: 1000;
            height: 100vh; /* Фиксируем высоту сайдбара */
            backdrop-filter: blur(10px);
        }

        header { padding: 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        
        .sidebar-content { 
            flex: 1; 
            overflow-y: auto; /* ВКЛЮЧАЕМ ПРОКРУТКУ */
            padding: 20px; 
            scrollbar-width: thin; 
            scrollbar-color: var(--accent) transparent;
        }

        /* Стили для красивого скроллбара в Chrome/Safari */
        .sidebar-content::-webkit-scrollbar { width: 6px; }
        .sidebar-content::-webkit-scrollbar-thumb { background-color: var(--accent); border-radius: 10px; }

        .logo-row { display: flex; justify-content: space-between; align-items: center; }
        .weather-bar { font-size: 11px; margin-top: 10px; display: flex; justify-content: space-between; color: var(--accent); font-weight: 700; }
        .user-profile { margin-top: 15px; padding: 12px; background: rgba(0,113,227,0.1); border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }

        .input-box { margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 800; margin-bottom: 5px; color: var(--text-muted); text-transform: uppercase; }
        
        input, select, textarea {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--card); color: var(--text); outline: none; box-sizing: border-box;
        }

        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--accent); color: white; font-weight: 700; cursor: pointer; }
        
        .l-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 10px; }
        .l-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .issue-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; cursor: pointer; transition: transform 0.2s; }
        .issue-card:hover { transform: scale(0.98); }
        .issue-img { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; margin-top: 10px; }

        #map { height: 100%; width: 100%; z-index: 1; }

        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal { width: 340px; background: var(--card); padding: 30px; border-radius: 30px; text-align: center; }

        .marker-pin { width: 28px; height: 28px; border-radius: 50% 50% 50% 0; border: 2px solid #fff; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; }
        .marker-pin span { transform: rotate(45deg); color: white; font-size: 11px; font-weight: 800; }
    </style>
</head>
<body>

<div class="overlay" id="authOverlay">
    <div class="modal">
        <div style="display:flex; gap:5px; justify-content:center; margin-bottom:15px;">
            <button class="l-btn active" onclick="setLang('ru')">РУС</button>
            <button class="l-btn" onclick="setLang('kz')">ҚАЗ</button>
        </div>
        <div id="loginForm">
            <h2 id="t_welcome">OPEN EKIBASTUZ</h2>
            <input type="text" id="logUser" placeholder="Логин" class="input-box">
            <input type="password" id="logPass" placeholder="Пароль" class="input-box">
            <button class="btn" onclick="handleLogin()" id="t_login_btn">Войти</button>
            <p style="font-size: 12px; margin-top: 15px; color: var(--accent); cursor: pointer" onclick="toggleAuth(true)" id="t_go_reg">Регистрация</p>
        </div>
        <div id="regForm" style="display:none;">
            <h2 id="t_reg_title">Создать аккаунт</h2>
            <input type="text" id="regUser" placeholder="Логин" class="input-box">
            <input type="password" id="regPass" placeholder="Пароль" class="input-box">
            <select id="regRole" class="input-box">
                <option value="user" id="t_role_user">Житель</option>
                <option value="admin" id="t_role_admin">Акимат</option>
            </select>
            <button class="btn" onclick="handleRegister()" id="t_reg_btn">Зарегистрироваться</button>
            <p style="font-size: 12px; margin-top: 15px; cursor: pointer" onclick="toggleAuth(false)" id="t_back">Назад</p>
        </div>
    </div>
</div>

<div class="layout">
    <div class="sidebar">
        <header>
            <div class="logo-row">
                <span style="font-weight:900;">OPEN EKIBASTUZ</span>
                <div style="display:flex; gap:5px;">
                    <button onclick="setLang('ru')" class="l-btn">RU</button>
                    <button onclick="setLang('kz')" class="l-btn">KZ</button>
                    <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer;">🌓</button>
                </div>
            </div>
            <div class="weather-bar"><span id="w_city">Ekibastuz</span> <span id="w_temp">--°C</span></div>
            <div class="user-profile" id="profileBox">
                <div style="font-size:12px; font-weight:700;" id="u_name">User</div>
                <button class="l-btn" style="color:var(--danger)" onclick="logout()" id="t_logout">Выйти</button>
            </div>
        </header>

        <div class="sidebar-content">
            <div id="panel_user">
                <div class="input-box"><label id="t_cat">Категория</label><select id="pType"><option value="Road">🛣 Дороги</option><option value="Trash">🚮 Мусор</option><option value="Light">💡 Свет</option></select></div>
                <div class="input-box"><label id="t_desc">Описание</label><textarea id="pDesc" rows="3"></textarea></div>
                <div class="input-box"><label id="t_photo">Фото</label><input type="file" id="pFile" accept="image/*"></div>
                <p id="t_map_hint" style="font-size:11px; color:var(--accent); font-weight:800;">📍 Выберите место на карте</p>
                <button class="btn" onclick="submitIssue()" id="t_send">Отправить</button>
            </div>
            <div id="panel_admin" style="display:none;"><h3 id="t_admin_mode">Акимат</h3><p id="t_admin_info" style="font-size:12px; color:var(--text-muted);">Управление городом</p></div>
            <h3 style="margin-top:25px; border-top:1px solid var(--border); padding-top:15px;" id="t_feed">Лента заявок</h3>
            <div id="feedList"></div>
        </div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, activeMarker, currentUser = null, selectedCoords = null, currLang = 'ru', currentTheme = 'light';
    const translations = {
        ru: { welcome:"OPEN EKIBASTUZ", login_btn:"Войти", go_reg:"Регистрация", reg_title:"Создать аккаунт", reg_btn:"Создать", back:"Назад", role_user:"Житель", role_admin:"Акимат", logout:"Выйти", cat:"Категория", desc:"Описание", photo:"Фото", map_hint:"📍 Выберите место", map_ok:"✅ Выбрано", send:"Отправить", feed:"Лента заявок", admin_mode:"Акимат", admin_info:"Управление городом", solve:"Решить", status_new:"⏳ В работе", status_done:"✅ Решено" },
        kz: { welcome:"OPEN EKIBASTUZ", login_btn:"Кіру", go_reg:"Тіркелу", reg_title:"Тіркелгі жасау", reg_btn:"Жасау", back:"Артқа", role_user:"Тұрғын", role_admin:"Әкімдік", logout:"Шығу", cat:"Санат", desc:"Сипаттама", photo:"Сурет", map_hint:"📍 Орын таңдаңыз", map_ok:"✅ Таңдалды", send:"Жіберу", feed:"Өтініштер", admin_mode:"Әкімдік", admin_info:"Қаланы басқару", solve:"Шешу", status_new:"⏳ Өңделуде", status_done:"✅ Шешілді" }
    };

    window.onload = () => { initMap(); updateWeather(); checkSession(); setLang('ru'); };

    function initMap() {
        if(map) map.remove();
        const style = currentTheme === 'dark' ? 'dark_all' : 'light_all';
        map = L.map('map', { zoomControl: false }).setView([51.7297, 75.3266], 13);
        L.tileLayer(`https://{s}.basemaps.cartocdn.com/${style}/{z}/{x}/{y}{r}.png`).addTo(map);
        map.on('click', e => {
            if(currentUser?.role === 'admin') return;
            selectedCoords = e.latlng;
            if(activeMarker) map.removeLayer(activeMarker);
            activeMarker = L.marker(selectedCoords, { icon: L.divIcon({ className: '', html: '<div style="background:#0a84ff; width:12px; height:12px; border-radius:50%; border:2px solid white;"></div>', iconSize:[12,12]}) }).addTo(map);
            document.getElementById('t_map_hint').innerText = translations[currLang].map_ok;
        });
    }

    function toggleTheme() { currentTheme = currentTheme === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', currentTheme); initMap(); renderFeed(); }
    function setLang(lang) { currLang = lang; for(let key in translations[lang]) { const el = document.getElementById('t_'+key); if(el) el.innerText = translations[lang][key]; } renderFeed(); }
    function checkSession() { const s = localStorage.getItem('eki_session'); if(s) { currentUser = JSON.parse(s); document.getElementById('authOverlay').style.display = 'none'; document.getElementById('u_name').innerText = currentUser.u; document.getElementById('panel_user').style.display = currentUser.role === 'admin' ? 'none' : 'block'; document.getElementById('panel_admin').style.display = currentUser.role === 'admin' ? 'block' : 'none'; renderFeed(); } }
    function handleLogin() { const u = document.getElementById('logUser').value, p = document.getElementById('logPass').value; const users = JSON.parse(localStorage.getItem('eki_users')) || []; const f = users.find(x => x.u === u && x.p === p); if(f) { localStorage.setItem('eki_session', JSON.stringify(f)); location.reload(); } else alert("Error!"); }
    function handleRegister() { const u = document.getElementById('regUser').value, p = document.getElementById('regPass').value, r = document.getElementById('regRole').value; const users = JSON.parse(localStorage.getItem('eki_users')) || []; users.push({u,p,role:r}); localStorage.setItem('eki_users', JSON.stringify(users)); toggleAuth(false); }
    function toggleAuth(reg) { document.getElementById('loginForm').style.display = reg ? 'none' : 'block'; document.getElementById('regForm').style.display = reg ? 'block' : 'none'; }
    function logout() { localStorage.removeItem('eki_session'); location.reload(); }

    async function submitIssue() {
        if(!selectedCoords) return alert(translations[currLang].map_hint);
        const f = document.getElementById('pFile').files[0];
        let img = f ? await new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f); }) : "";
        const db = JSON.parse(localStorage.getItem('eki_db')) || [];
        db.unshift({ id: Date.now(), type: document.getElementById('pType').value, desc: document.getElementById('pDesc').value, coords: selectedCoords, status: 'new', user: currentUser.u, photo: img });
        localStorage.setItem('eki_db', JSON.stringify(db));
        location.reload();
    }

    function renderFeed() {
        const list = document.getElementById('feedList'); const db = JSON.parse(localStorage.getItem('eki_db')) || [];
        list.innerHTML = ""; map.eachLayer(l => { if(l instanceof L.Marker && l !== activeMarker) map.removeLayer(l) });
        db.forEach(item => {
            const isDone = item.status === 'done';
            let color = isDone ? '#8e8e93' : (item.type === 'Road' ? '#ff3b30' : item.type === 'Trash' ? '#34c759' : '#ffcc00');
            const marker = L.marker([item.coords.lat, item.coords.lng], { icon: L.divIcon({ className: '', html: `<div class="marker-pin" style="background-color:${color} !important;"><span>${isDone ? '✓' : '!'}</span></div>`, iconSize: [28, 28], iconAnchor: [14, 28] }) }).addTo(map);
            const card = document.createElement('div'); card.className = 'issue-card'; card.style.borderLeft = `5px solid ${color}`;
            card.innerHTML = `<small style="color:${color}; font-weight:800;">${item.type.toUpperCase()}</small><div style="font-weight:600; margin:5px 0;">${item.desc || "..."}</div>${item.photo ? `<img src="${item.photo}" class="issue-img">` : ''}<div style="display:flex; justify-content:space-between; margin-top:10px;"><small>${translations[currLang]['status_'+item.status]}</small>${currentUser?.role === 'admin' && !isDone ? `<button class="l-btn" onclick="event.stopPropagation(); solve(${item.id})">${translations[currLang].solve}</button>` : ''}</div>`;
            card.onclick = () => map.setView([item.coords.lat, item.coords.lng], 16);
            list.appendChild(card);
        });
    }

    function solve(id) { let db = JSON.parse(localStorage.getItem('eki_db')); db.find(x => x.id === id).status = 'done'; localStorage.setItem('eki_db', JSON.stringify(db)); renderFeed(); }
    function updateWeather() { fetch('https://api.open-meteo.com/v1/forecast?latitude=51.72&longitude=75.32&current=temperature_2m').then(r => r.json()).then(d => document.getElementById('w_temp').innerText = `${Math.round(d.current.temperature_2m)}°C`).catch(() => {}); }
</script>
</body>
</html>
